services:
  postgres:
    image: postgres:17
    container_name: stockpulse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockpulse
      POSTGRES_PASSWORD: stockpulse_dev
      POSTGRES_DB: stockpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: